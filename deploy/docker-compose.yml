version: "3.9"

# =====================================================
# ModuForge Pro — Docker Compose 部署
# 从 Lite 升迁到 Pro 时使用。
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["pro"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: moduforge
      POSTGRES_USER: moduforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moduforge"]
      interval: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["pro"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    profiles: ["pro"]
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    profiles: ["pro"]
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-moduforge-pro-key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data

  moduforge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ":8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_PATH: /data/moduforge.db
      STORAGE_PATH: /data/storage
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - moduforge-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: []

volumes:
  pgdata:
  miniodata:
  meilidata:
  moduforge-data:
