# ============================================
# 系统优化工具箱 - 用户配置
# ============================================
# 修改此项可自定义优化行为
# 1 = 启用, 0 = 禁用

# 网络优化
ENABLE_NET_TWEAKS=1

# 内存管理优化
ENABLE_MEMORY_TWEAKS=1

# I/O 调度优化
ENABLE_IO_TWEAKS=1

# GPU 渲染优化
ENABLE_GPU_TWEAKS=1

# 电池优化
ENABLE_BATTERY_TWEAKS=1

# ZRAM 配置 (单位: MB, 0 = 自动)
ZRAM_SIZE_MB=0

# CPU 调节器 (schedutil / performance / interactive)
CPU_GOVERNOR=schedutil

# I/O 调度器 (bfq / kiokbps / cfq / noop)
IO_SCHEDULER=bfq

# TCP 拥塞控制算法 (bbr / bbr2 / cubic / westwood)
TCP_CONGESTION=bbr
