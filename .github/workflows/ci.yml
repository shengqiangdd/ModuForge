name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install gcc (for CGO/sqlite3)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test -v -race -count=1 ./internal/...

      - name: Build
        working-directory: backend
        run: CGO_ENABLED=1 go build -o /tmp/server ./cmd/moduforge/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: moduforge-server
          path: /tmp/server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (if configured)
        working-directory: frontend
        run: npx svelte-check --tsconfig ./tsconfig.json || true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t moduforge-backend ./backend

      - name: Build frontend image
        run: docker build -t moduforge-frontend ./frontend
