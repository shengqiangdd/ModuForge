services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8086:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=:8080
      - DATABASE_PATH=/app/data/moduforge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
